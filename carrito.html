<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Marcas Col</title>
    <link rel="stylesheet" href="/estilos/carrito.css">
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body>
<header class="catalogo-header">
  <div class="catalogo-header-content">
    <a href="index.html">
      <img src="imagenes/logo.jpg" alt="Marcas Col" class="logo">
    </a>
    <nav class="catalogo-nav">
      <div class="cart-title">
        <img src="imagenes/carrito.png" alt="Carrito de Compras" class="cart-icon">
        <span>Carrito de Compras</span>
      </div>
    </nav>
  </div>
</header>

    <main>
        <section id="cart">
            <h2 class="titulo-seccion">Mi Carrito</h2>
            <div id="carrito-list">
                <p style="text-align:center; padding:20px;">Cargando productos...</p>
            </div>
            <div id="carrito-total" class="total-container"></div>
            <div class="cart-actions">
                <button type="button" onclick="window.location.href='index.html'" class="btn-secundario">Seguir comprando</button>
                <button type="button" id="btn-continuar-checkout" class="btn-principal" onclick="toggleCheckout(true)">Finalizar compra</button>
            </div>
        </section>

        <section id="checkout" class="hidden">
            <div class="checkout-header">
                <button type="button" id="btn-volver-carrito" class="btn-volver" onclick="toggleCheckout(false)">← Volver al carrito</button>
                <h2>Datos de Envío</h2>
            </div>
            <form id="checkout-form" action="https://checkout.wompi.co/p/" method="GET">
                <input type="hidden" name="public-key" value="pub_test_cQrYMdUpn35pBXI9Rr7gJyyM7l0d793c" />
                <input type="hidden" name="currency" value="COP" />
                <input type="hidden" id="wompi-amount" name="amount-in-cents" value="0" />
                <input type="hidden" id="wompi-reference" name="reference" value="" />
                <input type="hidden" name="redirect-url" value="https://marcascol.com/confirmacion" />

                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="customer-data:full-name" placeholder="Ej: Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label for="documento">Documento de identidad (Cédula/NIT):</label>
                    <input type="text" id="documento" placeholder="Número de identificación" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="departamento">Departamento:</label>
                        <input type="text" id="departamento" placeholder="Ej: Antioquia" required>
                    </div>
                    <div class="form-group">
                        <label for="municipio">Municipio / Ciudad:</label>
                        <input type="text" id="municipio" placeholder="Ej: Medellín" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección exacta:</label>
                    <input type="text" id="direccion" placeholder="Calle, número, apto, barrio" required>
                </div>

                <div class="form-group">
                    <label for="adicional">Información adicional:</label>
                    <input type="text" id="adicional" placeholder="Conjunto, torre, indicaciones de entrega">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="telefono">Teléfono 1 (Principal):</label>
                        <input type="text" id="telefono" name="customer-data:phone-number" placeholder="Ej: 3141234567" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono2">Teléfono 2 (Opcional):</label>
                        <input type="text" id="telefono2" placeholder="Otro número de contacto">
                    </div>
                </div>
                <button type="submit" id="btn-pagar" class="btn-wompi">Pagar con Wompi</button>
            </form>
        </section>
    </main>

    <script>
        function toggleCheckout(showCheckout) {
            const cartSec = document.getElementById('cart');
            const checkSec = document.getElementById('checkout');
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];

            if (showCheckout) {
                if (carrito.length === 0) {
                    alert("Tu carrito está vacío");
                    return;
                }
                cartSec.classList.add('hidden');
                checkSec.classList.remove('hidden');
                window.scrollTo(0, 0);
            } else {
                cartSec.classList.remove('hidden');
                checkSec.classList.add('hidden');
            }
        }
    </script>
    <script src="carrito.js"></script>
</body>
</html>
