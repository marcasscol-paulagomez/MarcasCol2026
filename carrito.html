<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tu Carrito - Marcas Col</title>
    <link rel="stylesheet" href="/estilos/carrito.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script type="text/javascript" src="https://checkout.epayco.co/checkout.js"></script>
</head>
<body>

<header class="header-minimal">
    <div class="container-header">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver a la tienda</a>
        <img src="imagenes/logo.jpg" alt="Marcas Col" class="logo-mini">
    </div>
</header>

<main class="cart-wrapper">
    <div class="cart-container" id="cart-main-content">
        
        <div class="cart-products">
            <h1 class="page-title">Tu Carrito <span id="cart-count-title">(0)</span></h1>
            <div id="carrito-list">
                </div>
        </div>

        <aside class="cart-summary" id="cart-sidebar">
            <div class="summary-box">
                <h3>Resumen del pedido</h3>
                <div class="summary-item">
                    <span>Subtotal</span>
                    <span id="subtotal-val">$0</span>
                </div>
                <div class="summary-item">
                    <span>Envío</span>
                    <span class="free-shipping">Calculado en checkout</span>
                </div>
                <hr>
                <div class="summary-total">
                    <span>Total</span>
                    <span id="total-val">$0</span>
                </div>

                <button type="button" class="btn-checkout-trigger" onclick="toggleCheckout(true)">
                    Finalizar Compra
                </button>
                <div class="secure-badges">
                    <i class="fa-solid fa-shield-halved">
