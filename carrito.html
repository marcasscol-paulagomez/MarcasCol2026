<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Marcas Col</title>
    <script src="https://checkout.wompi.co/widget.js"></script>
    <link rel="stylesheet" href="/estilos/carrito.css">
    <style>
        .hidden { display: none !important; }
        #wompi-container {
            text-align: center;
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            min-height: 100px;
            margin-top: 20px;
        }
        #btn-wompi-dinamico {
            background-color: #000;
            color: #fff;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            border: none;
            width: 100%;
            transition: background 0.3s;
        }
        #btn-wompi-dinamico:hover { background-color: #333; }
    </style>
</head>
<body>
<header class="catalogo-header">
  <div class="catalogo-header-content">
    <a href="index.html">
      <img src="imagenes/logo.jpg" alt="Marcas Col" class="logo">
    </a>
    <nav class="catalogo-nav">
      <div class="cart-title">
        <img src="imagenes/carrito.png" alt="Carrito de Compras" class="cart-icon">
        <span>Carrito de Compras</span>
      </div>
    </nav>
  </div>
</header>

    <main>
        <section id="cart">
            <div id="carrito-list"></div>
            <div id="carrito-total"></div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="window.location.href='index.html'" style="padding: 10px 20px; cursor: pointer;">Seguir comprando</button>
                <button id="continuar" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold;">
                    Finalizar Compra
                </button>
            </div>
        </section>

        <section id="checkout" class="hidden" style="margin-top: 30px;">
            <hr>
            <h2>Datos para tu envío</h2>
            <form id="checkout-form" onsubmit="return false;">
                <label>Nombre completo: <input type="text" id="nombre" required style="width: 100%; margin-bottom: 10px;"></label>
                <label>Cédula o NIT: <input type="text" id="identificacion" required style="width: 100%; margin-bottom: 10px;"></label>
                <label>Ciudad: <input type="text" id="ciudad" required style="width: 100%; margin-bottom: 10px;"></label>
                <label>Dirección: <input type="text" id="direccion" required style="width: 100%; margin-bottom: 10px;"></label>
                <label>Barrio: <input type="text" id="barrio" required style="width: 100%; margin-bottom: 10px;"></label>
                <label>Teléfono: <input type="text" id="telefono" required style="width: 100%; margin-bottom: 20px;"></label>

                <div id="wompi-container">
                    </div>
            </form>
        </section>
    </main>
    <script src="carrito.js"></script>
</body>
</html>
