<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Marcas Col</title>
    <link rel="stylesheet" href="/estilos/carrito.css">
    <script type="text/javascript" src="https://checkout.epayco.co/checkout.js"></script>
</head>
<body>
<header class="catalogo-header">
  <div class="catalogo-header-content">
    <a href="index.html">
      <img src="imagenes/logo.jpg" alt="Marcas Col" class="logo">
    </a>
    <nav class="catalogo-nav">
      <div class="cart-title">
        <img src="imagenes/carrito.png" alt="Carrito de Compras" class="cart-icon">
        <span>Carrito de Compras</span>
      </div>
    </nav>
  </div>
</header>

<main class="carrito-main-layout">
    <section id="cart" class="columna-productos">
        <h2 class="titulo-seccion">Mi Carrito</h2>
        <div id="carrito-list">
            <p style="text-align:center; padding:20px;">Cargando productos...</p>
        </div>
        <div id="carrito-total" class="total-container"></div>
    </section>

    <section id="checkout" class="columna-despacho">
        <h2>Datos de Envío</h2>
        
        <form id="checkout-form" onsubmit="event.preventDefault(); abrirCheckoutEpayco(); return false;">
            <div class="form-group">
                <label for="nombre">Nombre completo:</label>
                <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
            </div>

            <div class="form-group">
                <label for="documento">Documento de identidad (Cédula/NIT):</label>
                <input type="text" id="documento" placeholder="Número de identificación" required>
            </div>

            <div class="form-row">
                <div class="form-group-half">
                    <label for="departamento">Departamento:</label>
                    <input type="text" id="departamento" placeholder="Ej: Antioquia" required>
                </div>
                <div class="form-group-half">
                    <label for="municipio">Municipio / Ciudad:</label>
                    <input type="text" id="municipio" placeholder="Ej: Medellín" required>
                </div>
            </div>

            <div class="form-group">
                <label for="direccion">Dirección exacta:</label>
                <input type="text" id="direccion" placeholder="Calle, número, apto, barrio" required>
            </div>

            <div class="form-group">
                <label for="adicional">Información adicional:</label>
                <input type="text" id="adicional" placeholder="Conjunto, torre, indicaciones de entrega">
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono / WhatsApp:</label>
                <input type="text" id="telefono" placeholder="Ej: 3141234567" required>
            </div>

            <div class="pago-seguro-info">
                <p>Pagos seguros protegidos por ePayco</p>
                <img src="https://369969691f4ad9213588-cf7563eead367d75333c72683ee069ef.ssl.cf2.rackcdn.com/epayco/pagos_procesados_por_epayco_2.png" alt="ePayco">
            </div>

            <button type="button" class="btn-epayco" onclick="abrirCheckoutEpayco()">Pagar con ePayco</button>
        </form>
    </section>
</main>

<script src="carrito.js"></script>
</body>
</html>
