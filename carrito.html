<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Marcas Col</title>
    <link rel="stylesheet" href="estilos/carrito.css">
    <style>
        .hidden { display: none !important; }
        #wompi-container { 
            min-height: 100px; 
            margin-top: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #fdfdfd;
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>
    <header class="catalogo-header">
        <div class="catalogo-header-content">
            <a href="index.html"><img src="imagenes/logo.jpg" alt="Logo" class="logo"></a>
            <h1 style="display: inline; margin-left: 10px;">Carrito de Compras</h1>
        </div>
    </header>

    <main style="padding: 20px; max-width: 800px; margin: auto;">
        <section id="cart">
            <div id="carrito-list"></div>
            <div id="carrito-total" style="font-size: 1.5rem; font-weight: bold; margin: 20px 0;"></div>
            <button onclick="window.location.href='index.html'">Seguir comprando</button>
            <button id="continuar" style="background: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer;">Finalizar Compra</button>
        </section>

        <section id="checkout" class="hidden">
            <h2>Datos de Envío</h2>
            <form id="checkout-form" onsubmit="return false;">
                <input type="text" id="nombre" placeholder="Nombre completo" required style="width:100%; margin-bottom:10px; padding:8px;">
                <input type="text" id="identificacion" placeholder="Cédula" required style="width:100%; margin-bottom:10px; padding:8px;">
                <input type="text" id="ciudad" placeholder="Ciudad" required style="width:100%; margin-bottom:10px; padding:8px;">
                <input type="text" id="direccion" placeholder="Dirección" required style="width:100%; margin-bottom:10px; padding:8px;">
                <input type="text" id="telefono" placeholder="Teléfono" required style="width:100%; margin-bottom:10px; padding:8px;">
                
                <div id="wompi-container">
                    <p id="msg-wompi">Cargando botón de pago...</p>
                </div>
            </form>
        </section>
    </main>

    <script src="carrito.js"></script>
</body>
</html>
