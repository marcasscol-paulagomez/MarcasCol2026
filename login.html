<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login y Gestión - Marcas Col</title>
	<link rel="stylesheet" href="estilos/styles.css">
</head>
<body>

	<div class="mensaje-superior" id="mensaje-superior">Panel de Administración Interno</div>

	<div class="container" id="login-container" style="display: block; margin-top: 80px;">
		<div class="form-title">Acceso propietarios</div>
		<div class="error-message" id="login-error" style="color: #e74c3c; text-align: center; margin-bottom: 10px; font-weight: 600;"></div>
		<form id="owner-login-form">
			<div class="input-group">
				<label for="owner-code">Código de acceso</label>
				<input type="password" id="owner-code" name="code" placeholder="Ingresa tu código de seguridad" required style="width:100%; padding:12px; border:1px solid #e0e0e0; border-radius:8px; background:#f8fafc; font-family:'Poppins',sans-serif;">
			</div>
			<button type="submit" class="btn" style="width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: 600; text-transform: uppercase;">Entrar</button>
		</form>
		<p class="form-help" style="margin-top:14px; font-size:0.85rem; color:#666; text-align:center;">Si no tienes el código, comunícate con el desarrollador de la página.</p>
	</div>

	<div class="container" id="admin-dyn-container" style="margin-top:32px; display:none; max-width: 600px;">
		
		<div class="form-title" style="font-size: 1.4rem; border-bottom: 2px solid #f3e8ff; padding-bottom: 6px;">Añadir Mensaje</div>
		<form id="mensaje-form">
			<div class="input-group">
				<label for="mensaje-texto">Mensaje Informativo</label>
				<textarea id="mensaje-texto" rows="3" placeholder="Escribe el anuncio para tus clientes..." required style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; font-family:'Poppins',sans-serif; background:#f8fafc;"></textarea>
			</div>
			<button type="submit" class="btn">Guardar Mensaje</button>
		</form>
		<hr style="border:0; height:1px; background:#eee; margin:30px 0;">

		<div class="form-title" style="font-size: 1.4rem; border-bottom: 2px solid #f3e8ff; padding-bottom: 6px;">Gestionar Marcas</div>
		<form id="formulario-marca">
			<div class="input-group">
				<label for="marca-nombre">Nombre de la marca</label>
				<input type="text" id="marca-nombre" placeholder="Ej. Difeel" required style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; background:#f8fafc;">
			</div>
			<div class="input-group">
				<label for="marca-imagen">Imagen de Marca</label>
				<input type="file" id="marca-imagen" accept="image/*" style="border:none; background:transparent; padding:5px 0;">
			</div>
			<button type="submit" class="btn">Agregar Marca</button>
		</form>
		<div id="lista-marcas-admin" style="margin-top: 15px;"></div>
		<hr style="border:0; height:1px; background:#eee; margin:30px 0;">

		<div class="form-title" style="font-size: 1.4rem; border-bottom: 2px solid #f3e8ff; padding-bottom: 6px;">Gestionar Secciones</div>
		<form id="seccion-form">
			<div class="input-group">
				<label for="seccion-nombre">Nombre de la sección</label>
				<input type="text" id="seccion-nombre" placeholder="Ej. Productos Destacados" required style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; background:#f8fafc;">
			</div>
			<button type="submit" class="btn">Agregar Sección</button>
		</form>
		<div id="lista-secciones-admin"></div>
		<hr style="border:0; height:1px; background:#eee; margin:30px 0;">

		<div class="form-title" style="font-size: 1.4rem; border-bottom: 2px solid #f3e8ff; padding-bottom: 6px;">Agregar Banner Principal</div>
		<form id="formulario-banner">
			<div class="input-group">
				<label for="banner-titulo">Título del Banner</label>
				<input type="text" id="banner-titulo" placeholder="Ej. ¡Llegó el Tónico Rapunzel!" required style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; background:#f8fafc;">
			</div>
			<div class="input-group">
				<label for="banner-descripcion">Descripción Corta</label>
				<input type="text" id="banner-descripcion" placeholder="Descripción..." style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; background:#f8fafc;">
			</div>
			<div class="input-group">
				<label for="banner-marca">Marca Asociada</label>
				<input type="text" id="banner-marca" placeholder="Ej. Marcas Col" style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; background:#f8fafc;">
			</div>
			<div class="input-group">
				<label for="banner-imagen">Imagen de Fondo</label>
				<input type="file" id="banner-imagen" accept="image/*" required>
			</div>
			<div class="input-group">
				<label for="banner-boton-texto">Texto del Botón</label>
				<input type="text" id="banner-boton-texto" placeholder="COMPRAR AHORA" style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px; background:#f8fafc;">
			</div>
			<div class="input-group">
				<label for="banner-boton-url">Enlace del Botón</label>
				<input type="text" id="banner-boton-url" placeholder="#catalogo-list" style="width:100%; padding
