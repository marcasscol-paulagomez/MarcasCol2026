<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login y Gestión - Marcas Col</title>
	<link rel="stylesheet" href="estilos/styles.css">
</head>
<body>
	<div class="mensaje-superior" id="mensaje-superior">Panel de Administración Interno</div>

	<div class="container" id="login-container" style="display: block; margin-top: 80px;">
		<div class="form-title">Acceso propietarios</div>
		<div class="error-message" id="login-error" style="color: #e74c3c; text-align: center; margin-bottom: 10px; font-weight: 600;"></div>
		<form id="owner-login-form">
			<div class="input-group">
				<label for="owner-code">Código de acceso</label>
				<input type="password" id="owner-code" name="code" placeholder="Ingresa tu código de seguridad" required style="width:100%; padding:12px; border:1px solid #e0e0e0; border-radius:8px; background:#f8fafc; font-family:'Poppins',sans-serif;">
			</div>
			<button type="submit" class="btn" style="width: 100%; margin-top: 15px; padding: 12px; border-radius: 8px; font-weight: 600; text-transform: uppercase;">Entrar</button>
		</form>
	</div>

	<div class="container" id="admin-dyn-container" style="margin-top:32px; display:none; max-width: 600px;">
		<div class="form-title">Añadir Mensaje</div>
		<form id="mensaje-form">
			<textarea id="mensaje-texto" rows="2" placeholder="Anuncio..." required style="width:100%; padding:10px; border:1px solid #e0e0e0; border-radius:8px Papyrus;"></textarea>
			<button type="submit" class="btn">Guardar Mensaje</button>
		</form>
		<hr style="border:0; height:1px; background:#eee; margin:20px 0;">

		<div class="form-title">Gestionar Marcas</div>
		<form id="formulario-marca">
			<input type="text" id="marca-nombre" placeholder="Ej. Difeel" required style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #e0e0e0; border-radius:8px;">
			<input type="file" id="marca-imagen" accept="image/*">
			<button type="submit" class="btn">Agregar Marca</button>
		</form>
		<div id="lista-marcas-admin"></div>
		<hr style="border:0; height:1px; background:#eee; margin:20px 0;">

		<div class="form-title">Gestionar Secciones</div>
		<form id="seccion-form">
			<input type="text" id="seccion-nombre" placeholder="Ej. Productos Destacados" required style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #e0e0e0; border-radius:8px;">
			<button type="submit" class="btn">Agregar Sección</button>
		</form>
		<div id="lista-secciones-admin"></div>
		<hr style="border:0; height:1px; background:#eee; margin:20px 0;">

		<div class="form-title">Agregar Banner</div>
		<form id="formulario-banner">
			<input type="text" id="banner-titulo" placeholder="Título..." required style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;">
			<input type="text" id="banner-descripcion" placeholder="Descripción..." style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;">
			<input type="text" id="banner-marca" placeholder="Marca..." style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;">
			<input type="file" id="banner-imagen" accept="image/*" required style="margin-bottom:5px;">
			<input type="text" id="banner-boton-texto" placeholder="Texto botón..." style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;">
			<input type="text" id="banner-boton-url" placeholder="URL botón..." style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #e0e0e0; border-radius:8px;">
			<button type="submit" class="btn">Agregar Banner</button>
		</form>
		<hr style="border:0; height:1px; background:#eee; margin:20px 0;">

		<div class="form-title">Agregar Producto</div>
		<form id="product-form" enctype="multipart/form-data">
			<input type="text" id="product-titulo" placeholder="Título..." required style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;">
			<input type="text" id="product-descripcion" placeholder="Descripción..." required style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;">
			<select id="product-seccion" required style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;"></select>
			<select id="product-marca" required style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;"></select>
			<input type="number" id="product-precio" placeholder="Precio..." required style="width:100%; padding:10px; margin-bottom:5px; border:1px solid #e0e0e0; border-radius:8px;">
			<input type="file" id="product-imagen" accept="image/*" required style="margin-bottom:10px;">
			<button type="submit" class="btn">Guardar Producto</button>
		</form>
	</div>

	<div class="admin-controls" id="admin-controls" style="display:none; text-align:center; margin-top:20px; gap:10px; justify-content:center;">
		<button id="btn-show-products" class="btn small">Productos</button>
		<button id="btn-show-banners" class="btn small">Banners</button>
		<button id="btn-refresh-lists" class="btn small">Refrescar</button>
		<button id="btn-logout" class="btn small" style="background:#e63946;">Salir</button>
	</div>

	<div id="products-list"></div>
	<div id="banners-list"></div>

	<script>
		window.API_BASE = "https://marcasscol-backend-production.up.railway.app";

		document.getElementById('owner-login-form').addEventListener('submit', async function(e) {
			e.preventDefault();
			const code = document.getElementById('owner-code').value;
			const errorDiv = document.getElementById('login-error');
			if(errorDiv) errorDiv.textContent = 'Conectando...';

			try {
				// El bypass del nocache obliga a refrescar la conexión directa
				const res = await fetch(`${window.API_BASE}/owner-login?v=${Date.now()}`, {
					method: 'POST',
					mode: 'cors', 
					headers: { 
						'Content-Type': 'application/json'
					},
					body: JSON.stringify({ code: code })
				});

				const data = await res.json();

				if (res.ok) {
					if(errorDiv) errorDiv.textContent = '';
					document.getElementById('login-container').style.display = 'none';
					document.getElementById('admin-dyn-container').style.display = 'block';
					document.getElementById('admin-controls').style.display = 'flex';
					
					if (typeof setupAdminControls === 'function') {
						setupAdminControls();
					} else {
						if(typeof poblarSelectMarcas === 'function') poblarSelectMarcas();
						if(typeof poblarSelectSecciones === 'function') poblarSelectSecciones();
						if(typeof listarYBorrarSecciones === 'function') listarYBorrarSecciones();
						if(typeof listarYBorrarMarcas === 'function') listarYBorrarMarcas();
					}
				} else {
					if(errorDiv) errorDiv.textContent = data.error || 'Código incorrecto';
				}
			} catch(err) {
				if(errorDiv) errorDiv.textContent = 'Error de conexión con el backend de Railway.';
				console.error(err);
			}
		});
	</script>
	<script src="script.js"></script>
</body>
</html>
