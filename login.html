<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" 
	      content="width=device-width, 
	               initial-scale=1.0">
	<title>Login y Gestión - Marcas Col</title>
	<link rel="stylesheet" 
	      href="estilos/styles.css">
	<link rel="stylesheet" 
	      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

	<div class="container" 
	     id="login-container">
		<div class="form-title">Acceso propietarios</div>
		<div class="error-message" 
		     id="login-error"></div>
		<form id="owner-login-form">
			<div class="input-group">
				<label for="owner-code">Código de acceso</label>
				<input type="password" 
				       id="owner-code" 
				       name="code" 
				       placeholder="Ingresa tu código" 
				       required>
			</div>
			<button type="submit" 
			        class="btn">Entrar</button>
		</form>
		<p class="form-help" 
		   style="margin-top:8px;">Si no tienes el código, 
			comunícate con soporte.</p>
	</div>

	<div class="container" 
	     id="admin-dyn-container" 
	     style="margin-top:32px; 
	            display:none;">
		
		<div class="form-title">Añadir Mensaje</div>
		<p class="form-help">Este mensaje se mostrará 
			en la parte superior.</p>
		<form id="mensaje-form">
			<div class="input-group">
				<label for="mensaje-texto">Mensaje</label>
				<textarea id="mensaje-texto" 
				          rows="3" 
				          required></textarea>
			</div>
			<button type="submit" 
			        class="btn">Guardar Mensaje</button>
			<div class="error-message" 
			     id="mensaje-error"></div>
			<div class="success-message" 
			     id="mensaje-success" 
			     style="display:none;"></div>
		</form>
		<hr>

		<div class="form-title">Gestionar Marcas</div>
		<form id="formulario-marca">
			<div class="input-group">
				<label for="marca-nombre">Nombre marca</label>
				<input type="text" 
				       id="marca-nombre" 
				       required>
			</div>
			<div class="input-group">
				<label for="marca-imagen">Imagen (opcional)</label>
				<input type="file" 
				       id="marca-imagen" 
				       accept="image/*">
			</div>
			<button type="submit" 
			        class="btn">Agregar Marca</button>
			<div class="error-message" 
			     id="marca-error"></div>
		</form>
		<div id="lista-marcas-admin" 
		     style="margin-top: 15px;"></div>
		<hr>

		<div class="form-title">Gestionar Secciones</div>
		<form id="seccion-form">
			<div class="input-group">
				<label for="seccion-nombre">Nombre sección</label>
				<input type="text" 
				       id="seccion-nombre" 
				       required>
			</div>
			<button type="submit" 
			        class="btn">Agregar Sección</button>
			<div class="error-message" 
			     id="seccion-error"></div>
		</form>
		<div id="lista-secciones-admin" 
		     style="margin-top: 15px;"></div>
		<hr>

		<div class="form-title">Agregar Banner</div>
		<form id="formulario-banner">
			<div class="input-group">
				<label for="banner-titulo">Título</label>
				<input type="text" 
				       id="banner-titulo" 
				       required>
			</div>
			<div class="input-group">
				<label for="banner-descripcion">Descripción</label>
				<input type="text" 
				       id="banner-descripcion">
			</div>
			<div class="input-group">
				<label for="banner-marca">Marca</label>
				<input type="text" 
				       id="banner-marca">
			</div>
			<div class="input-group">
				<label for="banner-imagen">Imagen</label>
				<input type="file" 
				       id="banner-imagen" 
				       accept="image/*" 
				       required>
			</div>
			<div class="input-group">
				<label for="banner-boton-texto">Texto Botón</label>
				<input type="text" 
				       id="banner-boton-texto">
			</div>
			<div class="input-group">
				<label for="banner-boton-url">URL Botón</label>
				<input type="text" 
				       id="banner-boton-url">
			</div>
			<button type="submit" 
			        class="btn">Agregar Banner</button>
			<div class="error-message" 
			     id="banner-error"></div>
		</form>
		<hr>

		<div class="form-title">Agregar Producto</div>
		<div class="error-message" 
		     id="product-error"></div>
		<form id="product-form" 
		      enctype="multipart/form-data">
			<div class="input-group">
				<label for="product-titulo">Título</label>
				<input type="text" 
				       id="product-titulo" 
				       name="titulo" 
				       required>
			</div>
			<div class="input-group">
				<label for="product-descripcion">Descripción</label>
				<input type="text" 
				       id="product-descripcion" 
				       name="descripcion" 
				       required>
			</div>
			<div class="input-group">
				<label for="product-seccion">Sección</label>
				<select id="product-seccion" 
				        name="seccion" 
				        required>
					<option value="">Selecciona sección</option>
				</select>
			</div>
			<div class="input-group">
				<label for="product-marca">Marca</label>
				<select id="product-marca" 
				        name="marca" 
				        required>
					<option value="">Selecciona marca</option>
				</select>
			</div>
			<div class="input-group">
				<label for="product-precio">Precio</label>
				<input type="number" 
				       id="product-precio" 
				       name="precio" 
				       min="0" 
				       step="0.01" 
				       required>
			</div>
			<div class="input-group">
				<label for="product-imagen">Imagen</label>
				<input type="file" 
				       id="product-imagen" 
				       name="imagen" 
				       accept="image/*" 
				       required>
			</div>
			<button type="submit" 
			        class="btn">Guardar Producto</button>
		</form>
	</div>

	<div class="admin-controls" 
	     id="admin-controls" 
	     style="display:none; 
	            max-width:900px; 
	            margin:18px auto; 
	            gap:12px; 
	            flex-wrap: wrap; 
	            justify-content: center;">
		<button id="btn-show-products" 
		        class="btn small">Productos publicados</button>
		<button id="btn-show-banners" 
		        class="btn small">Banners publicados</button>
		<button id="btn-refresh-lists" 
		        class="btn small">Refrescar todo</button>
		<button id="btn-logout" 
		        class="btn small" 
		        style="background:#c0392b;">Cerrar sesión</button>
	</div>

	<div id="products-list"></div>
	<div id="banners-list" 
	     style="width:100%; max-width:900px; margin:18px auto 80px auto;"></div>

	<script>
		window.API_BASE = "https://marcasscol-backend-production.up.railway.app";

		document.getElementById('owner-login-form')
			.addEventListener('submit', async function(e) {
			e.preventDefault();
			const codeValue = document.getElementById('owner-code').value;
			const errorDiv = document.getElementById('login-error');
			if(errorDiv) errorDiv.textContent = 'Conectando...';

			try {
				const res = await fetch(`${window.API_BASE}/owner-login`, {
					method: 'POST',
					mode: 'cors',
					headers: { 
						'Content-Type': 'application/json',
						'Accept': 'application/json'
					},
					body: JSON.stringify({ 
						code: codeValue,
						password: codeValue 
					})
				});

				const data = await res.json();

				if (res.ok) {
					if(errorDiv) errorDiv.textContent = '';
					document.getElementById('login-container')
						.style.display = 'none';
					document.getElementById('admin-dyn-container')
						.style.display = 'block';
					document.getElementById('admin-controls')
						.style.display = 'flex';
					
					if (typeof setupAdminControls === 'function') {
						setupAdminControls();
					}
				} else {
					if(errorDiv) {
						errorDiv.textContent = data.error || 'Código incorrecto';
					}
				}
			} catch(err) {
				if(errorDiv) {
					errorDiv.textContent = 'Error de conexión con Railway.';
				}
				console.error(err);
			}
		});
	</script>
	<script src="script.js"></script>
</body>
</html>
