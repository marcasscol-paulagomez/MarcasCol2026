<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Marcas Col | Tienda Test</title>
    <link rel="stylesheet" href="estilos/catalogo.css">
</head>
<body>
    <header>
        <img src="imagenes/logo.jpg" class="logo">
        <button id="btn-carrito">🛒 Carrito <span id="cart-count">(0)</span></button>
    </header>

    <main id="catalogo-list" class="catalogo-grid">
        </main>

    <div id="carrito-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:10px; width:90%; max-width:400px;">
            <span id="cerrar-carrito" style="cursor:pointer; float:right;">&times;</span>
            <h3>Tu Cesta</h3>
            <div id="carrito-productos"></div>
            <hr>
            <div id="carrito-resumen">Total: $0</div>
            <button id="continuar-compra" style="width:100%; padding:10px; background:black; color:white; margin-top:10px; cursor:pointer;">
                CONTINUAR AL PAGO
            </button>
        </div>
    </div>

    <script src="catalogo.js"></script>
</body>
</html>
