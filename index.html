<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcas Col | Tienda Oficial</title>
    <link rel="stylesheet" href="estilos/catalogo.css">
    <style>
        /* Estilos básicos para que el modal funcione si no los tienes en tu CSS */
        .carrito-overlay {
            display: none; /* Se cambia a 'flex' vía JS */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .carrito-modal {
            background: white; padding: 20px;
            border-radius: 10px; width: 90%; max-width: 400px;
            position: relative;
        }
        .cerrar-btn {
            position: absolute; top: 10px; right: 15px;
            cursor: pointer; font-size: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="catalogo-header">
        <div class="header-content">
            <img src="imagenes/logo.jpg" alt="Marcas Col" class="logo">
            
            <div class="header-right">
                <button class="cart-btn" onclick="abrirCesta()">
                    🛒 Carrito <span id="cart-count">(0)</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <section id="catalogo-list" class="catalogo-grid">
            <p style="text-align:center; padding:50px;">Cargando productos...</p>
        </section>
    </main>

    <div id="carrito-overlay" class="carrito-overlay">
        <div class="carrito-modal">
            <span id="cerrar-carrito" class="cerrar-btn">&times;</span>
            
            <h3>Tu Cesta</h3>
            <hr>
            
            <div id="carrito-productos" style="max-height: 300px; overflow-y: auto;">
                <p>Tu cesta está vacía</p>
            </div>

            <hr>
            <div style="display: flex; justify-content: space-between; font-weight: bold; margin-top: 15px;">
                <span>Total:</span>
                <span id="carrito-total">$0</span>
            </div>

            <button id="continuar-compra" style="width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 5px; margin-top: 15px; cursor: pointer;">
                Pagar con Wompi (Prueba)
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
