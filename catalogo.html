<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Marcas Col</title>
    <link rel="stylesheet" href="/estilos/carrito.css">
    <style>
        /* Por si acaso tu CSS no tiene la clase hidden, la definimos aquí */
        .hidden { display: none !important; }
    </style>
</head>
<body>
<header class="catalogo-header">
  <div class="catalogo-header-content">
    <a href="index.html">
      <img src="imagenes/logo.jpg" alt="Marcas Col" class="logo">
    </a>
    <nav class="catalogo-nav">
      <div class="cart-title">
        <img src="imagenes/carrito.png" alt="Carrito de Compras" class="cart-icon">
        <span>Carrito de Compras</span>
      </div>
    </nav>
  </div>
</header>

    <main>
        <section id="cart">
            <div id="carrito-list"></div>
            <div id="carrito-total"></div>
            
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="window.location.href='index.html'" style="padding: 10px 20px; cursor: pointer;">Seguir comprando</button>
                <button id="continuar" style="background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold;">
                    Finalizar Compra
                </button>
            </div>
        </section>

        <section id="checkout" class="hidden" style="margin-top: 30px;">
            <hr>
            <h2>Datos para tu envío</h2>
            <p><small>Por favor completa tus datos para habilitar el botón de pago.</small></p>
            
            <form id="checkout-form" onsubmit="return false;">
                <label>Nombre completo:
                    <input type="text" id="nombre" placeholder="Ej: Paula Gomez" required style="width: 100%; margin-bottom: 10px;">
                </label>
                 <label>Cédula o NIT:
                    <input type="text" id="identificación" required style="width: 100%; margin-bottom: 10px;">
                </label>
                <label>Ciudad:
                    <input type="text" id="Ciudad" required style="width: 100%; margin-bottom: 10px;">
                </label>
                <label>Dirección de entrega:
                    <input type="text" id="direccion" required style="width: 100%; margin-bottom: 10px;">
                </label>
                <label>Barrio:
                    <input type="text" id="barrio" required style="width: 100%; margin-bottom: 10px;">
                </label>
                <label>Teléfono Celular:
                    <input type="text" id="telefono" required style="width: 100%; margin-bottom: 20px;">
                </label>

                <div id="wompi-container" style="text-align: center; background: #f9f9f9; padding: 20px; border-radius: 8px; min-height: 100px;">
                  <script
                    src="https://checkout.wompi.co/widget.js"
                    data-render="dynamic"
                    data-public-key="pub_prod_s6o6uRKmlae54oP8MP2gQihvJEkwxDae" 
                    data-currency="COP"
                    data-amount-in-cents="0" 
                    data-reference="MarcasCol-Pedido"
                    id="wompi-button">
                  </script>
                </div>
            </form>
        </section>
    </main>

    <script src="carrito.js"></script>
</body>
</html>
