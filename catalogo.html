<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Marcas Col</title>
    <link rel="stylesheet" href="/estilos/carrito.css">
    <!-- Script de ePayco Obligatorio -->
    <script type="text/javascript" src="https://checkout.epayco.co/checkout.js"></script>
    <style>
        .hidden { display: none !important; }
        .btn-epayco {
            background-color: #ff5000; /* Color corporativo ePayco o usa el de tu marca */
            color: white;
            padding: 15px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
<header class="catalogo-header">
  <div class="catalogo-header-content">
    <a href="index.html">
      <img src="imagenes/logo.jpg" alt="Marcas Col" class="logo">
    </a>
    <nav class="catalogo-nav">
      <div class="cart-title">
        <img src="imagenes/carrito.png" alt="Carrito de Compras" class="cart-icon">
        <span>Carrito de Compras</span>
      </div>
    </nav>
  </div>
</header>

    <main>
        <!-- SECCIÓN 1: EL CARRITO -->
        <section id="cart">
            <h2 class="titulo-seccion">Mi Carrito</h2>
            <div id="carrito-list">
                <p style="text-align:center; padding:20px;">Cargando productos...</p>
            </div>
            <div id="carrito-total" class="total-container"></div>
            <div class="cart-actions">
                <button type="button" onclick="window.location.href='index.html'" class="btn-secundario">Seguir comprando</button>
                <button type="button" id="btn-continuar-checkout" class="btn-principal" onclick="toggleCheckout(true)">Finalizar compra</button>
            </div>
        </section>

        <!-- SECCIÓN 2: DATOS DE ENVÍO Y PAGO -->
        <section id="checkout" class="hidden">
            <div class="checkout-header">
                <button type="button" id="btn-volver-carrito" class="btn-volver" onclick="toggleCheckout(false)">← Volver al carrito</button>
                <h2>Datos de Envío</h2>
            </div>
            
            <form id="checkout-form" onsubmit="event.preventDefault(); abrirCheckoutEpayco();">
                <div class="form-group">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
                </div>
                <div class="form-group">
                    <label for="direccion">Dirección de entrega:</label>
                    <input type="text" id="direccion" placeholder="Calle, número, apto" required>
                </div>
                <div class="form-group">
                    <label for="barrio">Barrio:</label>
                    <input type="text" id="barrio" placeholder="Nombre del barrio" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono / WhatsApp:</label>
                    <input type="text" id="telefono" placeholder="Ej: 3141234567" required>
                </div>
                
                <div class="pago-seguro-info" style="margin: 20px 0; text-align: center;">
                    <p style="font-size: 0.9rem; color: #666;">Pagos protegidos por ePayco</p>
                    <img src="https://369969691f4ad9213588-cf7563eead367d75333c72683ee069ef.ssl.cf2.rackcdn.com/epayco/pagos_procesados_por_epayco_2.png" alt="ePayco" style="width: 200px;">
                </div>

                <button type="submit" class="btn-epayco">Pagar con ePayco</button>
            </form>
        </section>
    </main>

    <script>
        function toggleCheckout(showCheckout) {
            const cartSec = document.getElementById('cart');
            const checkSec = document.getElementById('checkout');
            const carrito = JSON.parse(localStorage.getItem("carrito")) || [];

            if (showCheckout) {
                if (carrito.length === 0) {
                    alert("Tu carrito está vacío");
                    return;
                }
                cartSec.classList.add('hidden');
                checkSec.classList.remove('hidden');
                window.scrollTo(0, 0);
            } else {
                cartSec.classList.remove('hidden');
                checkSec.classList.add('hidden');
            }
        }
    </script>
    <!-- Importante: Tu archivo JS debe cargarse después del de ePayco -->
    <script src="js/catalogo.js"></script>
</body>
</html>
